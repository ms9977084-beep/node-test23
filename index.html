<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>따뜻한 키오스크 AAC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="main-page">
        <h1>환영합니다!</h1>
        <p>아래 버튼을 누르면 메뉴판이 나옵니다.</p>
        <button id="view-menu" class="big-btn">메뉴판 보기</button>
    </main>

    <div id="menu" class="hidden">
        <h2>드시고 싶은 메뉴를 눌러주세요</h2>
        <div id="menu-list"></div>
    </div>

    <div id="detail-view" class="hidden">
        <div id="detail-container">
            <p id="detail-desc"></p>
            <div class="price-box">
                <p>가격은 이만큼이에요:</p>
                <img id="detail-price-img" src="" alt="가격 이미지">
            </div>
            <button id="close-detail">뒤로 가기</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
