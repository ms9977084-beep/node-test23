<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>따뜻한 키오스크 AAC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 초기 화면 -->
    <main id="main-page">
        <h1>환영합니다!</h1>
        <p style="font-size:0.9rem; color:#888;">🔊 소리를 듣고 싶다면 크롬(Chrome) 브라우저로 열어주세요!</p>
        <p>아래 버튼을 누르면 이동합니다.</p>
        <button id="view-menu">☕ 메뉴판 보기</button>
        <button id="view-goods">🎁 굿즈(기념 물건) 보기</button>
    </main>

    <!-- 메뉴판 화면 -->
    <div id="menu" class="hidden">
        <h2>메뉴를 선택하세요</h2>
        <button class="replay-btn" id="menu-replay">🔊 다시 듣기</button>
        <div id="menu-list"></div>
        <button class="back-btn" id="menu-back">◀ 뒤로 가기</button>
    </div>

    <!-- 굿즈 화면 -->
    <div id="goods" class="hidden">
        <h2>물건을 선택하세요</h2>
        <button class="replay-btn" id="goods-replay">🔊 다시 듣기</button>
        <div id="goods-list"></div>
        <button class="back-btn" id="goods-back">◀ 뒤로 가기</button>
    </div>

    <!-- 메뉴/굿즈 상세 화면 (공통) -->
    <div id="detail-view" class="hidden">
        <button id="close-detail">◀ 뒤로 가기</button>
        <div id="detail-content">
            <p id="detail-desc"></p>
            <button class="replay-btn" id="detail-replay">🔊 다시 듣기</button>
            <div id="detail-images">
                <img id="detail-menu-img" src="" alt="메뉴 이미지">
                <img id="detail-price-img" src="" alt="가격 이미지">
            </div>
        </div>
        <div id="speech-bubble" class="hidden">🔊 소리가 나오고 있어요!</div>
        <div class="detail-btn-row">
            <button id="order-btn">
                <img src="want_icon.jpg" alt="먹고싶어요 아이콘" class="order-icon">
                <span id="order-btn-label">주문할래요<br><small>(먹고싶어요)</small></span>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
